<html>
<head>
<title> spy no.</title>
</head>
<body>
<script>
var num=parseInt(prompt("enter the number:"));
var sum=0,mul=1;
while(num>0)
{
sum=sum+(num%10);
mul=mul*(num%10);
num=parseInt(num/10);

}
if(sum==mul){
document.write("<h1>spy number: sum=" + sum + " and mul=" + mul);
}
else{
document.write("<h1>not spy no.</h1>");
}
</script>
</body>
</html>
