<html>
<head>
<title>currency task</title>
</head>
<body>
<script>
var inr=parseInt(prompt("enter the INR:"));
var ch=parseInt(prompt("enter your choice:"));
switch(ch)
{
case 1:
	var dollar=inr/90;
	document.write("<h2>dollar is:</h2>"+dollar);
	break;
case 2:
	var rubal=inr/68;
	document.write("<h2>rubal is: </h2>"+rubal);
	break;
case 3:
	var dinar=inr/72;
	document.write("<h2>dinar is:</h2>"+dinar);
	break;
case 4:
	var yen=parseFloat(inr/47);
	document.write("<h2>yen is:</h2>"+yen);
	break;

}
</script>
</body>
</html>
