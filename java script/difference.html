<script>
var a=new Array();

}
var b=new Array();

b[i]=parseInt(prompt("enter the second number:"));
}
if(a[i]==b[i]){
var c=new Array();
for(var i=0;i<5;i++){
 c[i]=a[i];
}
document.write("<h1>" + "first array:"+a+"</h1>");
document.write("<h1>"+ "second array:"+b+ "</h1>");

document.write(c);
}
</script>
