<!DOCTYPE html>
<head>
<title>swap 4 digit</title>
</head>
<body>
<script>
var num=(prompt("enter the number:"));
var swap;
if(num.length>4){
	alert("enter digit of four!! not match");
}
else if(num.length<4){
	alert("enter digit of four not three!! not  match");
}
else
{
document.write("before swapping value is:"+ num);
swap=num[3]+num[1]+num[2]+num[0];
document.write("<br>after swapping value is:" + swap);
}

</script>
</body>
</html>
