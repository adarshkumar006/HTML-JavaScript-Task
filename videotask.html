<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Task</title>
<script>
function start(){

        var v=document.getElementById("my");
        var b=document.getElementById("image");

    if(v.paused)
       {
        v.play();
        b.src="C:\\Users\\Akhilesh\\OneDrive\\Desktop\\images\\pause.svg";
       }
       else{
        v.pause();
        b.src="C:\\Users\\Akhilesh\\OneDrive\\Desktop\\images\\play.svg"
       }
}
function makebig(){
                    
        var v=document.getElementById("my");
        v.width="800";
        v.height="500";
}
function getInfo()
    {
        var v=document.getElementById("my");
        var info=document.getElementById("info");
        
        info.innerHTML="Duration:"+v.duration+"Sec.";
        info.innerHTML+="<br>Source:"+v.currentSrc;

    if(v.paused)
        info.innerHTML+="<br>Video Status:<font color=red>Paused</font>";
        else
        info.innerHTML+="<br>Current Time:"+v.currentTime+"Sec";
        if(v.ended)
        info.innerHTML="<br>Video Status:<font color=green>Ended</font>";
        else
        info.innerHTML+="<br>Video Remaining:"+(v.duration-v.currentTime)+"Sec";
    
    window.setTimeout("getInfo()",100);
    }
        function setVol(obj)
        {
            var video=document.getElementById("my");
            video.volume=obj.value;
            document.getElementById("x").innerHTML=(obj.value*100)+"%";
            }
            
    function nextVideo(){

        var v=document.getElementById("my");
        v.src="C:\\Users\\Akhilesh\\OneDrive\\Desktop\\images\\video2.mp4";
        v.load();
    }

</script>
</head>
<body bgcolor="green">
 <div id="info"></div>   
<center>
        <fieldset style="background-color: gray; width:300px; height: 350px;">
<video id="my" height="300" width="500" src="C:\Users\Akhilesh\OneDrive\Desktop\images\video1.mp4" controls>
    Browser Can't Support Video plz upload Browser
</video>
<div align="center">
    <table border="1" style="border-width:10; background-color: chartreuse;">

    <tr >
        <td>
    <button onclick="start();" style="background-color: red; border-radius: 15px;"><img src="C:\Users\Akhilesh\OneDrive\Desktop\images\play.svg" height="20" width="20" id="image" /></button>
   </td>
   <td>
    <button onclick="makebig();" style="background-color: cyan; border-radius: 12px;">Make Big</button>
    </td>
    <td>
    <button onClick="getInfo();" style="background-color:green; border-radius: 12px;">Get Info</button>
   </td>
   <td>
    <input type="range" name="vol" max="1" min="0" step="0.1" onchange="setVol(this)"><span id="x"></span>
   </td>
   <td>
    <button onclick="nextVideo();" style="background-color: blue; border-radius: 12px;">>></button>
    </td>
</tr>
</table>

</div>
</fieldset>
</center>
</body>
</html>
